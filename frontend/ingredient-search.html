<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredient Search | The Hungry Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: '#ff6b6b', 'primary-hover': '#ff5252', secondary: '#4ecdc4', dark: '#2d3436' } }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <nav class="glass fixed w-full z-50 bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <i class="fa-solid fa-utensils text-primary text-2xl"></i>
                    <span class="font-bold text-2xl tracking-tight">The Hungry <span class="text-primary">Hub</span></span>
                </a>
                <div class="hidden md:flex items-center space-x-8" id="nav-links"></div>
                <div class="md:hidden flex items-center">
                    <button onclick="toggleMobileMenu()" class="text-gray-700 hover:text-primary focus:outline-none">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 text-center" id="mobile-nav-links"></div>
        </div>
    </nav>

    <div class="flex-grow pt-28 pb-20 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold mb-4">Pantry Search</h1>
            <p class="text-gray-500 max-w-2xl mx-auto">Enter the ingredients you have on hand, separated by commas, and we'll find recipes you can make right now.</p>
        </div>

        <div class="max-w-3xl mx-auto bg-white p-8 rounded-3xl shadow-sm border border-gray-100 mb-12">
            <form id="pantry-form" class="flex flex-col gap-4">
                <div class="relative">
                    <i class="fa-solid fa-carrot absolute left-4 top-4 text-gray-400 text-xl"></i>
                    <input type="text" id="ingredients-input" placeholder="e.g. Tomato, Onion, Garlic, Pasta" class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition text-lg" required>
                </div>
                <button type="submit" id="search-btn" class="bg-primary hover:bg-primary-hover text-white py-4 rounded-xl font-bold text-lg transition shadow-md hover-lift">
                    Find Recipes
                </button>
            </form>
            <div class="mt-4 flex flex-wrap gap-2" id="tags-container">
                <!-- Example tags -->
                <span class="text-xs text-gray-400">Examples:</span>
                <span class="px-2 py-1 bg-gray-100 rounded text-xs text-gray-600 cursor-pointer hover:bg-gray-200 transition" onclick="setExample('Chicken Breast, Rice, Onion')">Chicken & Rice</span>
                <span class="px-2 py-1 bg-gray-100 rounded text-xs text-gray-600 cursor-pointer hover:bg-gray-200 transition" onclick="setExample('Tomato, Pasta, Garlic, Basil')">Pasta Ingredients</span>
            </div>
        </div>

        <div id="results-container" class="hidden">
            <h2 class="text-2xl font-bold mb-6 border-b pb-2">Matching Recipes</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="recipes-grid">
                <!-- Results go here -->
            </div>
        </div>

    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        function setExample(text) {
            document.getElementById('ingredients-input').value = text;
        }

        document.getElementById('pantry-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('ingredients-input').value;
            const ingredients = input.split(',').map(i => i.trim()).filter(i => i);
            
            if (ingredients.length === 0) return;

            const btn = document.getElementById('search-btn');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Searching...';
            btn.disabled = true;

            try {
                const recipes = await api.recipes.matchIngredients(ingredients);
                displayResults(recipes);
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                btn.innerHTML = 'Find Recipes';
                btn.disabled = false;
            }
        });

        function displayResults(recipes) {
            const container = document.getElementById('results-container');
            const grid = document.getElementById('recipes-grid');
            
            container.classList.remove('hidden');

            if (recipes.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-10 bg-white rounded-xl"><p class="text-gray-500 text-lg">No recipes found with these ingredients. Try different ones.</p></div>';
                return;
            }

            grid.innerHTML = recipes.map(recipe => `
                <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden hover-lift flex flex-col cursor-pointer border border-gray-100" onclick="window.location.href='recipe-details.html?id=${recipe.recipe_id}'">
                    <div class="h-48 overflow-hidden relative">
                        <img src="${recipe.image_url}" alt="${recipe.name}" class="w-full h-full object-cover transition duration-500 hover:scale-110">
                    </div>
                    <div class="p-5 flex-grow flex flex-col">
                        <h3 class="font-bold text-lg text-gray-800 line-clamp-1 mb-2">${recipe.name}</h3>
                        <p class="text-sm text-green-600 font-medium mb-3"><i class="fa-solid fa-check-circle"></i> ${recipe.match_count} ingredient(s) matched</p>
                        <div class="mt-auto flex justify-between items-center border-t border-gray-50 pt-3">
                            <span class="text-xs font-medium px-2 py-1 bg-gray-100 text-gray-600 rounded-md"><i class="fa-regular fa-clock"></i> ${recipe.cooking_time}m</span>
                            <span class="text-xs font-medium px-2 py-1 ${recipe.difficulty === 'Easy' ? 'bg-green-100 text-green-700' : recipe.difficulty === 'Medium' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'} rounded-md">${recipe.difficulty}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
