<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes | The Hungry Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: '#ff6b6b', 'primary-hover': '#ff5252', secondary: '#4ecdc4', dark: '#2d3436' } }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <nav class="glass fixed w-full z-50 bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <i class="fa-solid fa-utensils text-primary text-2xl"></i>
                    <span class="font-bold text-2xl tracking-tight">The Hungry <span class="text-primary">Hub</span></span>
                </a>
                <div class="hidden md:flex items-center space-x-8" id="nav-links"></div>
                <div class="md:hidden flex items-center">
                    <button onclick="toggleMobileMenu()" class="text-gray-700 hover:text-primary focus:outline-none">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 text-center" id="mobile-nav-links"></div>
        </div>
    </nav>

    <div class="flex-grow pt-28 pb-20 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
        <div class="flex flex-col md:flex-row justify-between items-end mb-8 gap-4">
            <div>
                <h1 class="text-4xl font-bold mb-2">Explore Recipes</h1>
                <p class="text-gray-500">Find the perfect dish for any occasion</p>
            </div>
            
            <div class="w-full md:w-auto flex flex-col sm:flex-row gap-3">
                <div class="relative flex-grow">
                    <input type="text" id="search-input" placeholder="Search recipes..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition">
                    <i class="fa-solid fa-search absolute left-3 top-3 text-gray-400"></i>
                </div>
                <select id="filter-category" class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary focus:border-transparent outline-none bg-white">
                    <option value="">Any Category</option>
                    <option value="Breakfast">Breakfast</option>
                    <option value="Lunch">Lunch</option>
                    <option value="Dinner">Dinner</option>
                    <option value="Dessert">Dessert</option>
                    <option value="Snack">Snack</option>
                </select>
                <select id="filter-cuisine" class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary focus:border-transparent outline-none bg-white">
                    <option value="">Any Cuisine</option>
                    <option value="Indian">Indian</option>
                    <option value="Italian">Italian</option>
                    <option value="Mexican">Mexican</option>
                    <option value="American">American</option>
                    <option value="Chinese">Chinese</option>
                    <option value="Continental">Continental</option>
                </select>
                <select id="filter-mood" class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary focus:border-transparent outline-none bg-white">
                    <option value="">Any Mood</option>
                    <option value="Comforting">Comforting</option>
                    <option value="Healthy">Healthy</option>
                    <option value="Quick & Easy">Quick & Easy</option>
                    <option value="Festive">Festive</option>
                    <option value="Romantic">Romantic</option>
                </select>
                <select id="filter-difficulty" class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary focus:border-transparent outline-none bg-white">
                    <option value="">Any Difficulty</option>
                    <option value="Easy">Easy</option>
                    <option value="Medium">Medium</option>
                    <option value="Hard">Hard</option>
                </select>
                <button onclick="loadRecipes()" class="bg-primary hover:bg-primary-hover text-white px-6 py-2 rounded-lg font-medium transition shadow-sm">Filter</button>
            </div>
        </div>

        <div id="loading" class="text-center py-20 hidden">
            <div class="loader"></div>
            <p class="text-gray-500 mt-4">Loading recipes...</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6" id="recipes-grid">
            <!-- Populated by JS -->
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const searchParam = urlParams.get('search');
            const catParam = urlParams.get('category');
            
            if (searchParam) document.getElementById('search-input').value = searchParam;
            if (catParam) {
                const categorySelect = document.getElementById('filter-category');
                // Check if the parameter exists as an option before setting
                for (let i = 0; i < categorySelect.options.length; i++) {
                    if (categorySelect.options[i].value.toLowerCase() === catParam.toLowerCase()) {
                        categorySelect.selectedIndex = i;
                        break;
                    }
                }
            }
            
            const moodParam = urlParams.get('mood');
            if (moodParam) {
                const moodSelect = document.getElementById('filter-mood');
                for (let i = 0; i < moodSelect.options.length; i++) {
                    if (moodSelect.options[i].value.toLowerCase() === moodParam.toLowerCase()) {
                        moodSelect.selectedIndex = i;
                        break;
                    }
                }
            }
            
            loadRecipes();
        });

        async function loadRecipes() {
            const grid = document.getElementById('recipes-grid');
            const loading = document.getElementById('loading');
            grid.innerHTML = '';
            loading.classList.remove('hidden');

            try {
                const search = document.getElementById('search-input').value;
                const difficulty = document.getElementById('filter-difficulty').value;
                const category = document.getElementById('filter-category').value;
                const cuisine = document.getElementById('filter-cuisine').value;
                const mood = document.getElementById('filter-mood').value;
                
                let query = [];
                if (search) query.push(`search=${encodeURIComponent(search)}`);
                if (difficulty) query.push(`difficulty=${encodeURIComponent(difficulty)}`);
                if (category) query.push(`category=${encodeURIComponent(category)}`);
                if (cuisine) query.push(`cuisine=${encodeURIComponent(cuisine)}`);
                if (mood) query.push(`mood=${encodeURIComponent(mood)}`);

                const recipes = await api.recipes.getAll(query.join('&'));
                loading.classList.add('hidden');
                
                if (recipes.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center py-10"><p class="text-gray-500 text-lg">No recipes found matching your criteria.</p></div>';
                    return;
                }

                grid.innerHTML = recipes.map(recipe => `
                    <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden hover-lift flex flex-col cursor-pointer border border-gray-100" onclick="window.location.href='recipe-details.html?id=${recipe.recipe_id}'">
                        <div class="h-48 overflow-hidden relative">
                            <img src="${recipe.image_url}" alt="${recipe.name}" class="w-full h-full object-cover transition duration-500 hover:scale-110">
                            <div class="absolute top-3 right-3 bg-white/90 backdrop-blur-sm px-2 py-1 rounded-full text-xs font-bold text-gray-700 shadow-sm flex items-center gap-1">
                                <i class="fa-regular fa-clock text-primary"></i> ${recipe.cooking_time}m
                            </div>
                        </div>
                        <div class="p-5 flex-grow flex flex-col">
                            <h3 class="font-bold text-lg text-gray-800 line-clamp-2 mb-2">${recipe.name}</h3>
                            <div class="flex items-center gap-2 mb-3 text-xs text-gray-500">
                                ${recipe.category_name ? `<span class="bg-gray-100 px-2 py-1 rounded">${recipe.category_name}</span>` : ''}
                                ${recipe.cuisine_name ? `<span class="bg-gray-100 px-2 py-1 rounded">${recipe.cuisine_name}</span>` : ''}
                            </div>
                            <div class="flex items-center gap-1 mb-3 text-sm">
                                <i class="fa-solid fa-star text-yellow-400"></i>
                                <span class="font-bold">${Number(recipe.average_rating || 0).toFixed(1)}</span>
                                <span class="text-gray-400 text-xs">(${recipe.review_count || 0} reviews)</span>
                            </div>
                            <div class="mt-auto flex justify-between items-center border-t border-gray-50 pt-3">
                                <span class="text-xs font-medium px-2 py-1 ${recipe.difficulty === 'Easy' ? 'bg-green-100 text-green-700' : recipe.difficulty === 'Medium' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'} rounded-md">${recipe.difficulty}</span>
                                <span class="text-xs text-gray-500 font-medium">By ${recipe.author_name || 'Chef'}</span>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                loading.classList.add('hidden');
                grid.innerHTML = '<div class="col-span-full text-center py-10"><p class="text-red-500">Failed to load recipes.</p></div>';
            }
        }
    </script>
</body>
</html>
