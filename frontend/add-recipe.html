<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Recipe | The Hungry Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: '#ff6b6b', 'primary-hover': '#ff5252', secondary: '#4ecdc4', dark: '#2d3436' } }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <nav class="glass fixed w-full z-50 bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <i class="fa-solid fa-utensils text-primary text-2xl"></i>
                    <span class="font-bold text-2xl tracking-tight">The Hungry <span class="text-primary">Hub</span></span>
                </a>
                <div class="hidden md:flex items-center space-x-8" id="nav-links"></div>
                <div class="md:hidden flex items-center">
                    <button onclick="toggleMobileMenu()" class="text-gray-700 hover:text-primary focus:outline-none">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 text-center" id="mobile-nav-links"></div>
        </div>
    </nav>

    <div class="flex-grow pt-28 pb-20 max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
        <div class="bg-white rounded-3xl shadow-lg border border-gray-100 p-8 md:p-12">
            <h1 class="text-4xl font-extrabold mb-2 text-center">Share Your Recipe</h1>
            <p class="text-center text-gray-500 mb-10">Add your favorite dish to The Hungry Hub community</p>

            <form id="add-recipe-form" class="space-y-8">
                <!-- Basic Info -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="col-span-1 md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Recipe Name *</label>
                        <input type="text" id="recipe-name" required placeholder="e.g., Spicy Chicken Tacos" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:bg-white outline-none transition">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Cooking Time (minutes) *</label>
                        <input type="number" id="recipe-time" required min="1" placeholder="e.g., 30" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:bg-white outline-none transition">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Difficulty *</label>
                        <select id="recipe-difficulty" required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:bg-white outline-none transition">
                            <option value="Easy">Easy</option>
                            <option value="Medium">Medium</option>
                            <option value="Hard">Hard</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Category</label>
                        <select id="recipe-category" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:bg-white outline-none transition">
                            <option value="1">Breakfast</option>
                            <option value="2">Lunch</option>
                            <option value="3">Dinner</option>
                            <option value="4">Dessert</option>
                            <option value="5">Snack</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Cuisine</label>
                        <select id="recipe-cuisine" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:bg-white outline-none transition">
                            <option value="1">Italian</option>
                            <option value="2">Mexican</option>
                            <option value="3">Indian</option>
                            <option value="4">Chinese</option>
                            <option value="5">American</option>
                            <option value="6">Continental</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Mood</label>
                        <select id="recipe-mood" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:bg-white outline-none transition">
                            <option value="">Select Mood (Optional)</option>
                            <option value="1">Comforting</option>
                            <option value="2">Healthy</option>
                            <option value="3">Quick & Easy</option>
                            <option value="4">Festive</option>
                            <option value="5">Romantic</option>
                        </select>
                    </div>

                    <div class="col-span-1 md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Image URL</label>
                        <input type="url" id="recipe-image" placeholder="https://images.unsplash.com/photo-..." class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:bg-white outline-none transition">
                    </div>
                </div>

                <!-- Description & Steps -->
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Preparation Notes / Description</label>
                        <textarea id="recipe-notes" rows="3" placeholder="A brief description of this dish..." class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:bg-white outline-none transition"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Preparation Steps</label>
                        <textarea id="recipe-steps" rows="6" placeholder="1. Boil water...&#10;2. Add pasta..." class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:bg-white outline-none transition"></textarea>
                    </div>
                </div>

                <!-- Ingredients -->
                <div class="bg-gray-50 p-6 rounded-2xl border border-gray-200">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-bold text-gray-800">Ingredients</h3>
                        <button type="button" onclick="addIngredientRow()" class="text-primary hover:text-primary-hover font-bold text-sm"><i class="fa-solid fa-plus mr-1"></i> Add Ingredient</button>
                    </div>
                    <div id="ingredients-list" class="space-y-3">
                        <div class="flex gap-3 ingredient-row">
                            <input type="text" placeholder="Ingredient Name (e.g., Tomato)" required class="w-2/3 p-3 bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none ingredient-name">
                            <input type="text" placeholder="Qty (e.g., 2 pieces)" required class="w-1/3 p-3 bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none ingredient-qty">
                            <button type="button" onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 px-2"><i class="fa-solid fa-xmark text-xl"></i></button>
                        </div>
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" id="submit-btn" class="w-full bg-primary hover:bg-primary-hover text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-primary/40 hover-lift transition">
                        Publish Recipe
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('token')) {
                window.location.href = 'login.html?redirect=add-recipe.html';
            }
        });

        function addIngredientRow() {
            const list = document.getElementById('ingredients-list');
            const row = document.createElement('div');
            row.className = 'flex gap-3 ingredient-row';
            row.innerHTML = `
                <input type="text" placeholder="Ingredient Name" required class="w-2/3 p-3 bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none ingredient-name">
                <input type="text" placeholder="Qty" required class="w-1/3 p-3 bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none ingredient-qty">
                <button type="button" onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 px-2"><i class="fa-solid fa-xmark text-xl"></i></button>
            `;
            list.appendChild(row);
        }

        document.getElementById('add-recipe-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Publishing...';
            btn.disabled = true;

            const name = document.getElementById('recipe-name').value;
            const cooking_time = parseInt(document.getElementById('recipe-time').value);
            const difficulty = document.getElementById('recipe-difficulty').value;
            const category_id = parseInt(document.getElementById('recipe-category').value);
            const cuisine_id = parseInt(document.getElementById('recipe-cuisine').value);
            const mood_id = document.getElementById('recipe-mood').value ? parseInt(document.getElementById('recipe-mood').value) : null;
            const image_url = document.getElementById('recipe-image').value;
            const prep_notes = document.getElementById('recipe-notes').value;
            const steps = document.getElementById('recipe-steps').value;

            // Gather ingredients
            const ingredients = [];
            document.querySelectorAll('.ingredient-row').forEach(row => {
                const iName = row.querySelector('.ingredient-name').value;
                const iQty = row.querySelector('.ingredient-qty').value;
                if(iName) {
                    ingredients.push({ name: iName, quantity: iQty });
                }
            });

            try {
                const response = await fetch('http://localhost:5000/api/recipes/user-add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({
                        name, cooking_time, difficulty, category_id, cuisine_id, mood_id,
                        image_url, prep_notes, steps, ingredients
                    })
                });

                const data = await response.json();
                if(!response.ok) throw new Error(data.message || 'Failed to add recipe');

                showToast('Recipe added successfully!', 'success');
                setTimeout(() => {
                    window.location.href = 'recipes.html';
                }, 1500);

            } catch (error) {
                showToast(error.message, 'error');
                btn.innerHTML = 'Publish Recipe';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
