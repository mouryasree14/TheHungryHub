<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | The Hungry Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: '#ff6b6b', 'primary-hover': '#ff5252', secondary: '#4ecdc4', dark: '#2d3436' } }
            }
        }
    </script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    
    <nav class="glass fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <i class="fa-solid fa-utensils text-primary text-2xl"></i>
                    <span class="font-bold text-2xl tracking-tight">The Hungry <span class="text-primary">Hub</span></span>
                </a>
            </div>
        </div>
    </nav>

    <div class="flex-grow flex items-center justify-center pt-24 pb-12 px-4 sm:px-6 lg:px-8 bg-[url('https://images.unsplash.com/photo-1495195134817-a1a180058c92?auto=format&fit=crop&q=80&w=2000')] bg-cover bg-center bg-no-repeat relative">
        <div class="absolute inset-0 bg-dark/60 backdrop-blur-sm"></div>
        
        <div class="max-w-md w-full glass-dark rounded-3xl p-10 relative z-10 shadow-2xl animate-fade-in border border-white/20">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-white">Join Us</h2>
                <p class="mt-2 text-sm text-gray-300">Start your culinary journey</p>
            </div>
            <form id="register-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-200 mb-1">Full Name</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-regular fa-user text-gray-400"></i>
                        </div>
                        <input id="name" type="text" required class="w-full pl-10 pr-3 py-3 border border-gray-600 rounded-xl bg-dark/50 text-white placeholder-gray-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition" placeholder="John Doe">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-200 mb-1">Email address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-regular fa-envelope text-gray-400"></i>
                        </div>
                        <input id="email" type="email" required class="w-full pl-10 pr-3 py-3 border border-gray-600 rounded-xl bg-dark/50 text-white placeholder-gray-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition" placeholder="you@example.com">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-200 mb-1">Dietary Preference</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-leaf text-gray-400"></i>
                        </div>
                        <select id="preference" class="w-full pl-10 pr-3 py-3 border border-gray-600 rounded-xl bg-dark/50 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition appearance-none">
                            <option value="Any">Any</option>
                            <option value="Vegetarian">Vegetarian</option>
                            <option value="Vegan">Vegan</option>
                            <option value="Non-Vegetarian">Non-Vegetarian</option>
                            <option value="Pescatarian">Pescatarian</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-200 mb-1">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-gray-400"></i>
                        </div>
                        <input id="password" type="password" required minlength="6" class="w-full pl-10 pr-3 py-3 border border-gray-600 rounded-xl bg-dark/50 text-white placeholder-gray-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition" placeholder="•••••••• (Min 6 chars)">
                    </div>
                </div>

                <div>
                    <button type="submit" id="submit-btn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all hover-lift mt-2">
                        Create Account
                    </button>
                </div>
            </form>
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-300">
                    Already have an account? 
                    <a href="login.html" class="font-bold text-primary hover:text-primary-hover transition">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const preference = document.getElementById('preference').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submit-btn');

            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
            btn.disabled = true;

            try {
                await api.auth.register({ name, email, preference, password });
                showToast('Registration successful! Please login.', 'success');
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (error) {
                showToast(error.message, 'error');
                btn.innerHTML = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
